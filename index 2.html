<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAINER TAXI CYPRUS</title>
<style>
  :root { --navy: #0E2A44; --gold: #D4A32C; --light: #F3F5F7; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; color: var(--navy); line-height: 1.6; }
  .header { background: var(--navy); color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
  .hero { background: #e9ecef; padding: 60px 20px; text-align: center; }
  .booking-form { max-width: 600px; margin: -50px auto 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
  button { background: var(--gold); color: white; font-weight: bold; border: none; cursor: pointer; font-size: 16px; text-transform: uppercase; }
  button:hover { background: #b88a24; }
  .prices { padding: 40px 20px; max-width: 800px; margin: auto; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
  th { background: var(--navy); color: white; }
</style>
</head>
<body>

<header class="header">
  <div style="font-size: 24px; font-weight: bold; letter-spacing: 1px;">LAINER TAXI CYPRUS</div>
</header>

<section class="hero">
  <h1>LUXURY TAXI SERVICE IN CYPRUS</h1>
  <p>Fast, Reliable, and Comfortable Transfers</p>
</section>

<section class="booking-form">
  <h2>Book Your Ride</h2>
  <form action="https://formspree.io/f/mbdnjrov" method="POST">
    <label for="route">Select Route:</label>
    <select name="route" id="route" required>
      <option value="Larnaca Airport → Limassol">Larnaca Airport → Limassol</option>
      <option value="Larnaca Airport → Ayia Napa">Larnaca Airport → Ayia Napa</option>
      <option value="Larnaca Airport → Protaras">Larnaca Airport → Protaras (+10€)</option>
      <option value="Larnaca Airport → Nicosia">Larnaca Airport → Nicosia</option>
    </select>
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <input type="text" name="phone" placeholder="Phone Number" required>
    <button type="submit">BOOK NOW</button>
  </form>
</section>

<section class="prices">
  <h2>Our Rates</h2>
  <table>
    <tr><th>Route</th><th>Price (1-4 pax)</th></tr>
    <tr><td>Larnaca Airport → Limassol</td><td>75€</td></tr>
    <tr><td>Larnaca Airport → Ayia Napa</td><td>60€</td></tr>
    <tr><td>Larnaca Airport → Protaras</td><td>70€</td></tr>
    <tr><td>Larnaca Airport → Nicosia</td><td>55€</td></tr>
  </table>
</section>

</body>
</html>
